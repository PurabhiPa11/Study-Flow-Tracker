<!DOCTYPE html>
<html>
<head>
    <title>Study Flow Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="center">
    <h1>Study Flow Tracker</h1>
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="field" placeholder="Your Field (e.g. CS)">
    <button onclick="startApp()">Start</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <h2 id="welcome"></h2>

    <!-- PLAN SECTION -->
    <div class="card">
        <h3>Plan Your Day</h3>
        <input type="number" id="plannedHours" placeholder="Planned Hours">
        <button onclick="setPlan()">Set Plan</button>
    </div>

    <!-- WORK DONE -->
    <div class="card">
        <h3>Work Done</h3>
        <input type="number" id="completedHours" placeholder="Completed Hours">
        <button onclick="updateWork()">Update</button>
    </div>

    <!-- PROGRESS -->
    <div class="card">
        <h3>Progress</h3>
        <div class="progress-bar">
            <div id="progress"></div>
        </div>
        <p id="percent">0%</p>
        <p id="message"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
