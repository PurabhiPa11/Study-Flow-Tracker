<!DOCTYPE html>
<html>
<head>
    <title>Study Flow Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
    <h1>📚 Study Flow Tracker</h1>
    <p class="subtitle">Track your focus. Build consistency.</p>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="field" placeholder="Your Field">
    <button onclick="startApp()">Start</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <div class="top-bar">
        <h2 id="welcome"></h2>
        <div class="streak">🔥 Streak: <span id="streak">0</span></div>
    </div>

    <div class="grid">

        <!-- PROGRESS -->
        <div class="card progress-card">
            <h3>Progress</h3>
            <div class="circle">
                <svg>
                    <circle cx="60" cy="60" r="50"></circle>
                    <circle cx="60" cy="60" r="50" id="circleProgress"></circle>
                </svg>
                <div id="percent">0%</div>
            </div>
            <p id="message"></p>
        </div>

        <!-- PLAN -->
        <div class="card">
            <h3>Plan Your Day</h3>
            <input type="number" id="plannedHours" placeholder="Planned Hours">
            <button onclick="setPlan()">Set Plan</button>
        </div>

        <!-- TASK INPUT -->
        <div class="card">
            <h3>Add Task</h3>
            <input type="text" id="taskName" placeholder="Task name">

            <select id="taskType">
                <option>Study</option>
                <option>Assignment</option>
                <option>Project</option>
                <option>Presentation</option>
            </select>

            <button onclick="addTask()">Add Task</button>
        </div>

        <!-- TASK LIST -->
        <div class="card">
            <h3>Your Tasks</h3>
            <div id="taskList"></div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
