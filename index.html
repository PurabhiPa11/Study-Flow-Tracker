<!DOCTYPE html>
<html>
<head>
    <title>Study Flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
    <div class="login-card">
        <h1>📚 Study Flow</h1>
        <p>Track your focus. Build consistency.</p>

        <input type="text" id="name" placeholder="Your Name">
        <button onclick="startApp()">Enter</button>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h2 id="welcome"></h2>
        </div>

        <!-- HERO -->
        <section class="hero">
            <div class="progress-container">
                <div class="circle">
                    <svg>
                        <circle cx="70" cy="70" r="60"></circle>
                        <circle cx="70" cy="70" r="60" id="circleProgress"></circle>
                    </svg>
                    <div id="percent">0%</div>
                </div>

                <div class="progress-text">
                    <h2 id="message">Start your day</h2>
                    <p>Track your daily progress</p>
                </div>
            </div>
        </section>

        <!-- CATEGORY -->
        <section class="categories">
            <div class="cat active" onclick="selectType(this)">📘 Study</div>
            <div class="cat" onclick="selectType(this)">💻 Coding</div>
            <div class="cat" onclick="selectType(this)">📝 Assignment</div>
            <div class="cat" onclick="selectType(this)">📊 Presentation</div>
        </section>

        <!-- TASK INPUT -->
        <section class="task-input">
            <input type="text" id="taskName" placeholder="Write your task...">
            <input type="number" id="taskHours" placeholder="Hours">
            <button onclick="addTask()">Add</button>
        </section>

        <!-- TASK LIST -->
        <section id="taskList" class="task-list"></section>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
